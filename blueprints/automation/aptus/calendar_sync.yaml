blueprint:
  name: Calendar sync
  description: >
    One-way sync of upcoming events from a source calendar (e.g.
    `calendar.laundry` from the Aptus integration) to a destination
    calendar (e.g. Google Calendar). Reconciles on HA start, on a
    schedule, on source state change, and on `aptus_event`
    (booking_created / booking_cancelled) so portal-side changes
    propagate without waiting for the next poll.

    Requires the **hacs_calendar_utils** integration
    (https://github.com/swehog/hacs_calendar_utils) — it exposes
    `calendar_utils.get_events` (returns events with `uid`, unlike core
    HA's `calendar.get_events` which strips it) and
    `calendar_utils.delete_event_by_uid` (which core HA does not
    expose as a generic service). Both are needed for the dedup and
    cancellation flows below. The destination calendar must advertise
    `CREATE_EVENT` and `DELETE_EVENT` in its `supported_features`.

    Dedup: each created destination event has `[sync_uid:<source.uid>]`
    embedded in its description, so the blueprint can identify
    previously-synced events on subsequent passes.

    Cancellation: when a previously synced source event disappears,
    the destination copy is deleted and a fresh event with the
    `[CANCELLED]` prefix is created at the same time slot (HA has no
    `calendar.update_event` service, so delete-and-recreate is the
    only path).
  domain: automation
  source_url: https://github.com/thiagoalmeidasa/aptus-homeassistant/blob/main/blueprints/automation/aptus/calendar_sync.yaml
  input:
    source_calendar:
      name: Source calendar
      description: >
        Calendar to read events from (e.g. `calendar.laundry`). Events
        must expose a stable `uid` for dedup to work.
      selector:
        entity:
          domain: calendar
    destination_calendar:
      name: Destination calendar
      description: >
        Calendar to write events to (e.g. your Google Calendar). Must
        support `CREATE_EVENT` and `DELETE_EVENT`.
      selector:
        entity:
          domain: calendar
    lookahead_days:
      name: Look-ahead window (days)
      description: >
        How far into the future to reconcile. Bookings further out are
        ignored until they fall inside the window.
      default: 30
      selector:
        number:
          min: 1
          max: 90
          step: 1
          unit_of_measurement: days
          mode: slider
    sync_interval:
      name: Sync interval
      description: >
        How often to reconcile in addition to event-driven triggers —
        a safety net for missed bus events.
      default: "/10"
      selector:
        select:
          options:
            - label: Every 5 minutes
              value: "/5"
            - label: Every 10 minutes
              value: "/10"
            - label: Every 15 minutes
              value: "/15"
            - label: Every 30 minutes
              value: "/30"
    use_ha_timezone:
      name: Convert event times to Home Assistant's timezone
      description: >
        When on, source event times are converted to your HA timezone
        before being created on the destination. Leave on unless source
        and destination intentionally use different timezones.
      default: true
      selector:
        boolean:

mode: single
max_exceeded: silent

trigger:
  - platform: homeassistant
    event: start
    id: ha_start
  - platform: time_pattern
    minutes: !input sync_interval
    id: scheduled
  - platform: state
    entity_id: !input source_calendar
    id: source_state_change
  - platform: event
    event_type: aptus_event
    event_data:
      type: booking_created
    id: aptus_booking_created
  - platform: event
    event_type: aptus_event
    event_data:
      type: booking_cancelled
    id: aptus_booking_cancelled

variables:
  source_cal: !input source_calendar
  dest_cal: !input destination_calendar
  lookahead: !input lookahead_days
  use_tz: !input use_ha_timezone

action:
  - service: calendar_utils.get_events
    target:
      entity_id: !input source_calendar
    data:
      start_date_time: "{{ now().isoformat() }}"
      end_date_time: "{{ (now() + timedelta(days=lookahead | int)).isoformat() }}"
    response_variable: source_resp

  - service: calendar_utils.get_events
    target:
      entity_id: !input destination_calendar
    data:
      start_date_time: "{{ now().isoformat() }}"
      end_date_time: "{{ (now() + timedelta(days=lookahead | int)).isoformat() }}"
    response_variable: dest_resp

  - variables:
      source_events: "{{ source_resp.events | default([], true) }}"
      dest_events: "{{ dest_resp.events | default([], true) }}"
      dest_sync_uids: >-
        {{ dest_events
           | map(attribute='description')
           | select('string')
           | map('regex_findall', '\\[sync_uid:([^\\]]+)\\]')
           | sum(start=[]) | list }}
      source_uids: >-
        {{ source_events | map(attribute='uid') | reject('none') | list }}
      to_create: >-
        {%- set ns = namespace(items=[]) -%}
        {%- for s in source_events -%}
          {%- if s.uid and s.uid not in dest_sync_uids -%}
            {%- set ns.items = ns.items + [s] -%}
          {%- endif -%}
        {%- endfor -%}
        {{ ns.items }}
      to_cancel: >-
        {%- set ns = namespace(items=[]) -%}
        {%- for d in dest_events -%}
          {%- set m = (d.description | default('')) | regex_findall('\\[sync_uid:([^\\]]+)\\]') -%}
          {%- if m and m[0] not in source_uids
                 and not (d.summary | default('')).startswith('[CANCELLED]') -%}
            {%- set ns.items = ns.items + [d] -%}
          {%- endif -%}
        {%- endfor -%}
        {{ ns.items }}

  - repeat:
      for_each: "{{ to_create }}"
      sequence:
        - service: calendar.create_event
          target:
            entity_id: !input destination_calendar
          data:
            summary: "{{ repeat.item.summary }}"
            description: >-
              {{ repeat.item.description | default('', true) }} [sync_uid:{{ repeat.item.uid }}]
            start_date_time: >-
              {% if use_tz -%}
                {{ (repeat.item.start | as_datetime | as_local).isoformat() }}
              {%- else -%}
                {{ repeat.item.start }}
              {%- endif %}
            end_date_time: >-
              {% if use_tz -%}
                {{ (repeat.item.end | as_datetime | as_local).isoformat() }}
              {%- else -%}
                {{ repeat.item.end }}
              {%- endif %}

  - repeat:
      for_each: "{{ to_cancel }}"
      sequence:
        - service: calendar_utils.delete_event_by_uid
          target:
            entity_id: !input destination_calendar
          data:
            uid: "{{ repeat.item.uid }}"
        - service: calendar.create_event
          target:
            entity_id: !input destination_calendar
          data:
            summary: "[CANCELLED] {{ repeat.item.summary }}"
            description: "{{ repeat.item.description | default('', true) }}"
            start_date_time: "{{ repeat.item.start }}"
            end_date_time: "{{ repeat.item.end }}"
